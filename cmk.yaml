version: 1

toolchain:
  linux: libcxx@22.1.8-1

cmake:
  generator: Ninja Multi-Config
  default-preset: default
  default-configuration: Debug
  compile-commands: default
  launcher: ccache

  presets:
    default:
      build-dir: build
    gui:
      build-dir: build-gui
      variables:
        CIND_BUILD_GUI: ON

  configurations:
    - name: Debug
    - name: Release
    - name: Asan
      compile: [-g, "-fsanitize=address,undefined", -fno-omit-frame-pointer]
      link: ["-fsanitize=address,undefined"]
    - name: Tsan
      compile: [-g, -fsanitize=thread, -fno-omit-frame-pointer]
      link: [-fsanitize=thread]

format:
  ignore: [third_party/skia/**]

lint:
  ignore: [third_party/skia/**]
  header-filter: ^src/
  extra-args: ["--checks=clang-analyzer-*,bugprone-*,performance-*"]
